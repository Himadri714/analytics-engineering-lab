version: 2

models:
  - name: globepay_transaction_events
    config:
      meta:
        authors:
          - Himadri Sarma <himadris714@gmail.com>

    description: Intermediate model combining payment acceptance and chargeback data at transaction grain.

    columns:
      - name: external_ref
        description: Unique transaction identifier.
        tests:
          - not_null
          - unique

      - name: status
        description: Transaction status from the source system.

      - name: payment_source
        description: Payment method or source used for the transaction.

      - name: merchant_reference
        description: Merchant-provided reference associated with the transaction.

      - name: transaction_date
        description: Transaction date derived from transaction_timestamp.

      - name: payment_status
        description: Outcome of the transaction such as ACCEPTED or DECLINED.

      - name: cvv_provided
        description: Indicates whether CVV was provided for the transaction.

      - name: amount
        description: Transaction amount in original currency.
        tests:
          - not_null

      - name: country
        description: Country where the transaction was made.

      - name: currency
        description: Currency of the original transaction.
        tests:
          - not_null

      - name: chargeback
        description: Indicates whether the transaction resulted in a chargeback.

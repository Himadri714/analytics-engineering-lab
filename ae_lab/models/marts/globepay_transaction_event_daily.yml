version: 2

models:
  - name: globepay_transaction_event_daily
    description: Final mart model at transaction event grain with transaction attributes and amount normalized to USD for reporting.
    config:
      meta:
        authors:
          - Himadri Sarma <himadris714@gmail.com>

    columns:
      - name: external_ref
        description: Unique transaction reference.
        tests:
          - not_null
          - unique

      - name: status
        description: Transaction status from the source system.

      - name: payment_source
        description: Payment method or source used for the transaction.

      - name: transaction_date
        description: Date of the transaction.
        tests:
          - not_null

      - name: payment_status
        description: Payment outcome or status of the transaction.

      - name: country
        description: Country associated with the transaction.

      - name: amount
        description: Original transaction amount.
        tests:
          - not_null

      - name: currency
        description: Original transaction currency.
        tests:
          - not_null

      - name: chargeback
        description: Indicates whether the transaction resulted in a chargeback.

      - name: amount_in_usd
        description: Transaction amount converted to USD using the matching conversion rate.
        tests:
          - not_null